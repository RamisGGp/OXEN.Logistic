<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OXEN - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        (function () {
            if (localStorage.getItem('oxen-theme') === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>

    <style>
        :root {
            --bg-color: #0b110d;
            --card-bg: #111a14;
            --primary-green: #2ecc71;
            --primary-green-glow: rgba(46, 204, 113, 0.2);
            --text-main: #ffffff;
            --text-muted: #8e9e93;
            --border-color: #1f2d24;
            --input-bg: #0d1410;
            --error-red: #e74c3c;
        }

        html.light-theme {
            --bg-color: #f5f7f5;
            --card-bg: #ffffff;
            --primary-green: #1fa159;
            --primary-green-glow: rgba(31, 161, 89, 0.15);
            --text-main: #10160f;
            --text-muted: #667169;
            --border-color: #e1e7e2;
            --input-bg: #f0f3f1;
            --error-red: #d63c2c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Resplandor ambiental de fondo, igual espíritu que el circle-glow del dashboard */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.08) 0%, transparent 70%);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        /* ================= TARJETA DE LOGIN ================= */
        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .logo-img {
            height: 65px;
            width: auto;
        }

        .logo-light { display: none; }
        .logo-dark { display: inline-block; }

        html.light-theme .logo-dark { display: none; }
        html.light-theme .logo-light { display: inline-block; }

        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .status-dot-small {
            width: 8px;
            height: 8px;
            background: var(--primary-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--primary-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.field-icon {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 13px 15px 13px 42px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px var(--primary-green-glow);
        }

        .form-group input.input-error {
            border-color: var(--error-red);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            background: none;
            border: none;
        }

        .toggle-password:hover { color: var(--primary-green); }

        .error-message {
            color: var(--error-red);
            font-size: 0.8rem;
            margin-top: 6px;
            display: none;
        }

        .error-message.show { display: block; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--primary-green);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary-green);
            text-decoration: none;
        }

        .forgot-link:hover { text-decoration: underline; }

        .btn {
            padding: 13px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: #000;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px var(--primary-green-glow);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .signup-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .signup-text a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-text a:hover { text-decoration: underline; }

        .back-home {
            position: absolute;
            top: 25px;
            left: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2;
        }

        .back-home:hover { color: var(--primary-green); }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 2;
        }

        .theme-toggle:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        @media (max-width: 480px) {
            .login-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <a href="Inicio.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema claro u oscuro">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>
    <div class="ambient-glow"></div>

    <div class="login-card">
        <div class="login-logo">
            <img src="logo.png" alt="OXEN" class="logo-img logo-dark">
            <img src="logo-light.png" alt="OXEN" class="logo-img logo-light">
        </div>
        <p class="login-subtitle">
            <span class="status-dot-small"></span>
            Monitoreo Inteligente de Ganado
        </p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="usuario">Usuario o correo electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user field-icon"></i>
                    <input type="text" id="usuario" name="usuario" placeholder="nombre@rancho.com" autocomplete="username">
                </div>
                <span class="error-message" id="errorUsuario">Ingresa tu usuario o correo.</span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="errorPassword">Ingresa tu contraseña.</span>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> Recordarme
                </label>
                <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
            </button>

            <div class="divider">o</div>

            <p class="signup-text">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usuarioInput = document.getElementById('usuario');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.innerHTML = isPassword
                ? '<i class="fa-solid fa-eye-slash"></i>'
                : '<i class="fa-solid fa-eye"></i>';
        });

        function setError(input, errorEl, show) {
            input.classList.toggle('input-error', show);
            errorEl.classList.toggle('show', show);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const usuarioValido = usuarioInput.value.trim().length > 0;
            const passwordValido = passwordInput.value.trim().length > 0;

            setError(usuarioInput, document.getElementById('errorUsuario'), !usuarioValido);
            setError(passwordInput, document.getElementById('errorPassword'), !passwordValido);

            if (usuarioValido && passwordValido) {
                window.location.href = 'Inicio.html';
            }
        });

        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Aquí se abrirá el flujo de recuperación de contraseña (pendiente de backend).');
        });

        document.getElementById('signupLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Aquí se abrirá el formulario de registro de nuevo usuario/rancho.');
        });

        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function updateThemeIcon() {
            const isLight = document.documentElement.classList.contains('light-theme');
            themeIcon.className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            themeToggleBtn.title = isLight ? 'Cambiar a tema oscuro' : 'Cambiar a tema claro';
        }

        updateThemeIcon();

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const isLight = document.documentElement.classList.contains('light-theme');
            localStorage.setItem('oxen-theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        });
    </script>
</body>
</html>
